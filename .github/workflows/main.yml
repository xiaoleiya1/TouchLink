name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore TouchLinkHost/TouchLinkHost.csproj
      
    - name: Build
      run: dotnet build TouchLinkHost/TouchLinkHost.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TouchLinkHost
        path: publish/TouchLinkHost.exe
